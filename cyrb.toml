name = "cyrius-doom"
version = "0.26.0"
license = "GPL-3.0-only"
entry = "src/main.cyr"
output = "doom"
description = "DOOM in Cyrius — 129KB, direct framebuffer, no libc, just syscalls."
repository = "https://github.com/MacCracken/cyrius-doom"

[deps]
stdlib = ["string", "alloc", "fmt", "args"]

[deps.bsp]
git = "https://github.com/MacCracken/bsp"
tag = "1.1.1"
modules = ["dist/bsp.cyr"]

[deps.shravan]
git = "https://github.com/MacCracken/shravan"
tag = "2.0.0"
modules = ["src/pcm.cyr", "src/wav.cyr", "src/codec.cyr"]
