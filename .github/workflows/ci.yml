name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          # Read pinned toolchain from cyrius.cyml (single source of
          # truth, matching vani / yukti CI).
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Lock file present
        # cyrius.lock is the supply-chain integrity anchor for the
        # [deps.bsp] / [deps.vani] git overrides + transitive
        # [deps.yukti] / [deps.patra]. Without a committed lock,
        # `cyrius deps --verify` trivially matches the just-created
        # lock — providing zero integrity. Same gate vani / yukti use.
        run: |
          test -f cyrius.lock || {
            echo "::error::cyrius.lock missing — supply-chain integrity requires this committed"
            exit 1
          }

      - name: Resolve dependencies
        run: cyrius deps

      - name: Verify dep hashes
        run: cyrius deps --verify

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/doom
          echo "doom: $(wc -c < build/doom) bytes"

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: doom-x86_64
          path: build/doom
          retention-days: 5

  test:
    name: Test (WAD-free subset — 37 asserts)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          # Read pinned toolchain from cyrius.cyml (single source of
          # truth, matching vani / yukti CI).
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Lock file present
        run: |
          test -f cyrius.lock || {
            echo "::error::cyrius.lock missing — supply-chain integrity requires this committed"
            exit 1
          }

      - name: Resolve dependencies
        run: cyrius deps

      - name: Verify dep hashes
        run: cyrius deps --verify

      - name: Run tests (WAD-free assertions)
        run: |
          # WAD is not checked into the repo, so this runs the 37-assertion
          # subset that doesn't need DOOM1.WAD (asr, fixed-point, trig, angles).
          # The full 73-assertion suite requires passing a WAD path.
          cyrius test tests/doom.tcyr 2>&1 | tee /tmp/test_output
          tail -1 /tmp/test_output | grep "0 failed"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          for doc in README.md CHANGELOG.md VERSION LICENSE cyrius.cyml cyrius.toml; do
            test -f "$doc" && echo "OK: $doc" || { echo "MISSING: $doc"; exit 1; }
          done

      - name: Verify version consistency
        # VERSION is the release-gate anchor (release.yml's "Verify
        # version" step compares it to the pushed tag). Ensure it
        # also appears in CHANGELOG.md so a release never ships
        # without a documented entry.
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          grep -q "version = \"$VERSION\"" cyrius.cyml || { echo "FAIL: version mismatch in cyrius.cyml"; exit 1; }
          grep -q "version = \"$VERSION\"" cyrius.toml || { echo "FAIL: version mismatch in cyrius.toml"; exit 1; }
          echo "Version consistent across VERSION / cyrius.cyml / cyrius.toml / CHANGELOG.md"
