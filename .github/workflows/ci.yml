name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # Read pinned toolchain from cyrius.cyml (single source of truth,
        # matching vani / yukti / patra CI). Version-pinned install layout
        # — cyrius CLI's stdlib resolver prefers this path. Pre-flight
        # HTTP check surfaces a clear error if the cyml pin is ahead of
        # the published cyrius release.
        run: |
          set -e
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          TARBALL="cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          URL="https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/$TARBALL"
          HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" -I "$URL")
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "302" ]; then
            echo "::error::Cyrius release $CYRIUS_VERSION not found on GitHub (HTTP $HTTP_CODE)."
            echo "::error::cyrius.cyml's 'cyrius =' pin was bumped ahead of the published release."
            exit 1
          fi
          curl -sLO "$URL"
          tar xzf "$TARBALL"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin" "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin/"* 2>/dev/null || true
          ln -sfn "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin" "$HOME/.cyrius/bin"
          ln -sfn "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib" "$HOME/.cyrius/lib"
          echo "$CYRIUS_VERSION" > "$HOME/.cyrius/current"
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Lock file present
        # cyrius.lock is the supply-chain integrity anchor for the
        # [deps.bsp] / [deps.vani] git overrides + transitive
        # [deps.yukti] / [deps.patra]. Without a committed lock,
        # `cyrius deps --verify` trivially matches the just-created
        # lock — providing zero integrity. Same gate vani / yukti use.
        run: |
          test -f cyrius.lock || {
            echo "::error::cyrius.lock missing — supply-chain integrity requires this committed"
            exit 1
          }

      - name: Resolve dependencies
        # Fetch/resolve the dep tree. NOTE: under the 6.1.29 pin the
        # `cyrius deps` lock WRITER regressed (writes an incomplete lock —
        # drops ~41 of the 92 entries, the same class as the cycc 6.0.1
        # regression). Its rewritten lock is discarded by the restore step
        # below; this step is kept only to fetch the deps.
        run: cyrius deps

      - name: Restore committed lock (guard 6.1.29 writer regression)
        # The committed cyrius.lock is the supply-chain anchor; `cyrius deps`
        # above overwrote it with an incomplete lock. Restore the committed
        # version so the verify gate checks the real anchor, not the broken
        # writer's output.
        run: git checkout -- cyrius.lock

      - name: Verify dep hashes
        # Unconditional supply-chain gate: the committed cyrius.lock (restored
        # above) is verified against the resolved dep hashes. Verifies clean
        # (92/0) under 6.1.29 — only the lock WRITER is broken, not --verify.
        run: cyrius deps --verify

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/doom
          echo "doom: $(wc -c < build/doom) bytes"

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: doom-x86_64
          path: build/doom
          retention-days: 5

  test:
    name: Test (WAD-free subset — 37 asserts)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # Read pinned toolchain from cyrius.cyml (single source of truth,
        # matching vani / yukti / patra CI). Version-pinned install layout
        # — cyrius CLI's stdlib resolver prefers this path. Pre-flight
        # HTTP check surfaces a clear error if the cyml pin is ahead of
        # the published cyrius release.
        run: |
          set -e
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          TARBALL="cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          URL="https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/$TARBALL"
          HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" -I "$URL")
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "302" ]; then
            echo "::error::Cyrius release $CYRIUS_VERSION not found on GitHub (HTTP $HTTP_CODE)."
            echo "::error::cyrius.cyml's 'cyrius =' pin was bumped ahead of the published release."
            exit 1
          fi
          curl -sLO "$URL"
          tar xzf "$TARBALL"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin" "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin/"* 2>/dev/null || true
          ln -sfn "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin" "$HOME/.cyrius/bin"
          ln -sfn "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib" "$HOME/.cyrius/lib"
          echo "$CYRIUS_VERSION" > "$HOME/.cyrius/current"
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Lock file present
        run: |
          test -f cyrius.lock || {
            echo "::error::cyrius.lock missing — supply-chain integrity requires this committed"
            exit 1
          }

      - name: Resolve dependencies
        # Fetch/resolve the dep tree. NOTE: under the 6.1.29 pin the
        # `cyrius deps` lock WRITER regressed (writes an incomplete lock —
        # drops ~41 of the 92 entries, the same class as the cycc 6.0.1
        # regression). Its rewritten lock is discarded by the restore step
        # below; this step is kept only to fetch the deps.
        run: cyrius deps

      - name: Restore committed lock (guard 6.1.29 writer regression)
        # The committed cyrius.lock is the supply-chain anchor; `cyrius deps`
        # above overwrote it with an incomplete lock. Restore the committed
        # version so the verify gate checks the real anchor, not the broken
        # writer's output.
        run: git checkout -- cyrius.lock

      - name: Verify dep hashes
        # Unconditional supply-chain gate: the committed cyrius.lock (restored
        # above) is verified against the resolved dep hashes. Verifies clean
        # (92/0) under 6.1.29 — only the lock WRITER is broken, not --verify.
        run: cyrius deps --verify

      - name: Run tests (WAD-free assertions)
        run: |
          # WAD is not checked into the repo, so this runs the 37-assertion
          # subset that doesn't need DOOM1.WAD (asr, fixed-point, trig, angles).
          # The full 73-assertion suite requires passing a WAD path.
          cyrius test tests/doom.tcyr 2>&1 | tee /tmp/test_output
          tail -1 /tmp/test_output | grep "0 failed"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        # cyrius.toml + cyrb.toml retired in 0.27.0; cyrius.cyml is the
        # single manifest (matches patra/vani/sakshi/mihi convention).
        run: |
          for doc in README.md CHANGELOG.md VERSION LICENSE cyrius.cyml; do
            test -f "$doc" && echo "OK: $doc" || { echo "MISSING: $doc"; exit 1; }
          done

      - name: Verify version consistency
        # VERSION is the single source of truth (release.yml's "Verify
        # version" step compares it to the pushed tag). cyrius.cyml uses
        # the `${file:VERSION}` template — resolve it for the consistency
        # check. Same shape as patra/vani CI.
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CYML_RAW=$(grep '^version = ' cyrius.cyml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$CYML_RAW" = "\${file:VERSION}" ]; then
              CYML_VERSION="$FILE_VERSION"
          else
              CYML_VERSION="$CYML_RAW"
          fi
          [ "$FILE_VERSION" = "$CYML_VERSION" ] || { echo "VERSION ($FILE_VERSION) != cyrius.cyml ($CYML_RAW)"; exit 1; }
          grep -q "$FILE_VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          echo "Version consistent: $FILE_VERSION (cyml: $CYML_RAW)"
