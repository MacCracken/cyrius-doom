name: Release

on:
  push:
    tags: ['*']

permissions:
  contents: write

env:
  CYRIUS_VERSION: "2.2.0"

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TOML_VERSION=$(grep '^version' cyrb.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG="${GITHUB_REF_NAME}"
          [ "$FILE_VERSION" = "$TAG" ] || { echo "VERSION != tag"; exit 1; }
          [ "$TOML_VERSION" = "$TAG" ] || { echo "cyrb.toml != tag"; exit 1; }

      - name: Install Cyrius
        run: CYRIUS_VERSION=$CYRIUS_VERSION curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | sh

      - name: Build
        run: |
          export PATH="$HOME/.cyrius/bin:$PATH"
          cyrb build src/main.cyr build/doom
          echo "doom: $(wc -c < build/doom) bytes"

      - name: Archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          git archive --format=tar.gz --prefix="cyrius-doom-${TAG}/" -o "cyrius-doom-${TAG}-src.tar.gz" HEAD
          sha256sum "cyrius-doom-${TAG}-src.tar.gz" > SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            cyrius-doom-*-src.tar.gz
            SHA256SUMS

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
      - name: Changelog
        run: awk "/^## \\[${GITHUB_REF_NAME}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/body.md
      - uses: softprops/action-gh-release@v2
        with:
          name: "cyrius-doom ${{ github.ref_name }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') }}
          files: |
            cyrius-doom-${{ github.ref_name }}-src.tar.gz
            SHA256SUMS
