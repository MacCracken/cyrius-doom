[package]
name = "cyrius-doom"
version = "0.26.1"
description = "DOOM in Cyrius — clean-room, direct framebuffer, no libc, just syscalls."
license = "GPL-3.0-only"
repository = "https://github.com/MacCracken/cyrius-doom"
language = "cyrius"
cyrius = "5.5.2"

# NOTE: cyrius.cyml is the canonical manifest as of v0.26.0 (5.x convention).
# This .toml is kept in sync as a build-tool compatibility shim during the
# transition. The authoritative [deps.bsp] entry lives in cyrius.cyml.

[build]
src = "src/main.cyr"
output = "build/doom"

[deps]
# Order matters — single-pass compiler, deps are prepended as includes.
# string/alloc must come before anything that uses strlen/alloc/memcpy.
# io before audio (audio uses syscall wrappers). sakshi standalone.
stdlib = ["string", "alloc", "fmt", "vec", "str", "io", "args", "syscalls", "sakshi", "audio"]
